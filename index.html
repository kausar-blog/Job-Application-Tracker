<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>

    <!-- favicon -->
    <link rel="shortcut icon" href="./img/logo.png" type="image/x-icon" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.css"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- fonts awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- header Section start -->
    <header class="container mx-auto px-4 py-10">
      <h1
        class="text-center text-4xl md:text-6xl font-extrabold mb-10 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 bg-clip-text text-transparent"
      >
        Job Application Tracker
      </h1>
      <!--  -->
      <!-- Dashboard Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-8">
        <!-- TOTAL -->
        <div
          class="relative rounded-2xl p-7 bg-gradient-to-br from-indigo-500/10 via-white/40 to-indigo-500/5 border border-indigo-400/20 shadow-xl transition-transform duration-500 hover:scale-105 hover:shadow-indigo-500/30 overflow-hidden"
        >
          <div class="flex justify-between items-center relative z-10">
            <p
              class="text-gray-600 font-semibold tracking-wide text-sm uppercase"
              >Total</p
            >
            <div
              class="dashboard-icon text-indigo-500 text-3xl transition-transform duration-500 hover:rotate-6 hover:scale-110"
            >
              <i class="fa-solid fa-layer-group"></i>
            </div>
          </div>

          <p
            id="appTotal"
            class="text-4xl md:text-5xl font-extrabold mt-3 tracking-tight bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent"
            >0</p
          >

          <!-- Glow Circle -->
          <div
            class="absolute -top-10 -right-10 w-30 h-30 rounded-full bg-indigo-500/30 blur-3xl opacity-0 transition-opacity duration-700 dashboard-card-glow"
          ></div>
        </div>

        <!-- INTERVIEW -->
        <div
          class="relative rounded-2xl p-7 bg-gradient-to-br from-green-500/10 via-white/40 to-green-500/5 border border-green-400/20 shadow-xl transition-transform duration-500 hover:scale-105 hover:shadow-green-500/30 overflow-hidden"
        >
          <div class="flex justify-between items-center relative z-10">
            <p
              class="text-gray-600 font-semibold tracking-wide text-sm uppercase"
              >Interview</p
            >
            <div
              class="dashboard-icon text-green-500 text-3xl transition-transform duration-500 hover:rotate-6 hover:scale-110"
            >
              <i class="fa-solid fa-user-check"></i>
            </div>
          </div>

          <p
            id="appInterview"
            class="text-4xl md:text-5xl font-extrabold mt-3 tracking-tight bg-gradient-to-r from-green-600 to-emerald-600 bg-clip-text text-transparent"
            >0</p
          >

          <div
            class="absolute -top-10 -right-10 w-30 h-30 rounded-full bg-green-500/30 blur-3xl opacity-0 transition-opacity duration-700 dashboard-card-glow"
          ></div>
        </div>

        <!-- REJECTED -->
        <div
          class="relative rounded-2xl p-7 bg-gradient-to-br from-red-500/10 via-white/40 to-red-500/5 border border-red-400/20 shadow-xl transition-transform duration-500 hover:scale-105 hover:shadow-red-500/30 overflow-hidden"
        >
          <div class="flex justify-between items-center relative z-10">
            <p
              class="text-gray-600 font-semibold tracking-wide text-sm uppercase"
              >Rejected</p
            >
            <div
              class="dashboard-icon text-red-500 text-3xl transition-transform duration-500 hover:rotate-6 hover:scale-110"
            >
              <i class="fa-solid fa-circle-xmark"></i>
            </div>
          </div>

          <p
            id="appRejected"
            class="text-4xl md:text-5xl font-extrabold mt-3 tracking-tight bg-gradient-to-r from-red-600 to-rose-600 bg-clip-text text-transparent"
            >0</p
          >

          <div
            class="absolute -top-10 -right-10 w-30 h-30 rounded-full bg-red-500/30 blur-3xl opacity-0 transition-opacity duration-700 dashboard-card-glow"
          ></div>
        </div>
      </div>
    </header>

    <!-- link -->
    <div class="relative my-10 overflow-hidden">
      <div
        class="h-0.5 w-full bg-gradient-to-r from-transparent via-indigo-500/70 to-transparent"
      ></div>

      <!-- moving light -->
      <div
        class="absolute top-0 left-[-40%] h-0.5 w-[40%] bg-gradient-to-r from-transparent via-white to-transparent opacity-80 animate-lineMove"
      >
      </div>
    </div>

    <!-- main part -->
    <main class="container mx-auto px-4 py-10">
      <!-- all button -->
      <div
        class="flex flex-col md:flex-row md:justify-between md:items-center gap-6 mb-8"
      >
        <!-- Filter Buttons -->
        <div
          class="flex flex-wrap gap-2 bg-white/40 backdrop-blur-lg border border-gray-200 rounded-2xl p-2 shadow-sm"
        >
          <button
            id="filterAll"
            class="filter-btn bg-gradient-to-r bg-purple-600 text-white px-4 py-2 rounded-xl text-sm font-semibold shadow-md transition-all duration-300 active-filter"
            type="button"
            >All</button
          >
          <button
            id="filterInterview"
            class="filter-btn bg-transparent text-black px-4 py-2 rounded-xl text-sm font-semibold shadow-md transition-all duration-300 hover:bg-green-100 hover:text-green-600"
            type="button"
            >Interview</button
          >
          <button
            id="filterRejected"
            class="filter-btn bg-transparent text-black px-4 py-2 rounded-xl text-sm font-semibold shadow-md transition-all duration-300 hover:bg-red-100 hover:text-red-600"
            type="button"
            >Rejected</button
          >
        </div>

        <!-- Jobs Info -->
        <div
          class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500/20 backdrop-blur-xl border border-purple-300 rounded-xl px-3 py-[6px] shadow-lg flex justify-center items-center"
        >
          <p
            class="text-white font-semibold text-sm md:text-base tracking-wide flex flex-wrap gap-1 items-center"
          >
            <span id="job-info-count" class="hidden flex items-center gap-1">
              <span
                id="visibleJobsCount"
                class="font-extrabold text-base md:text-lg px-2 py-0.5 bg-white/20 text-purple-800 rounded-full"
                >0</span
              >
              of
            </span>
            <span
              id="jobsCount"
              class="font-extrabold text-base md:text-lg px-2 py-0.5 bg-white/20 text-purple-800 rounded-full"
              >0</span
            >
            jobs
          </p>
        </div>
      </div>

      <!-- filtered section new-->
      <section id="filteredIntRej" class="hidden space-y-6"> </section>

      <!-- filtered card -->
      <section id="jobCards" class="space-y-6 px-4 md:px-0">
        <!-- card template 1 -->
        <div
          class="flex border rounded-2xl overflow-hidden shadow-lg transition-transform duration-300 hover:scale-105"
        >
          <div
            id="active-color"
            class="w-1.5 bg-gray-300 rounded transition-all duration-300"
          ></div>
          <div
            class="flex flex-col md:flex-row justify-between p-6 w-full gap-4"
          >
            <!-- main Contain -->
            <div class="space-y-4 md:space-y-6 flex-1">
              <!-- title and position -->
              <p
                class="jobCompany text-2xl md:text-3xl font-bold mb-3 text-gray-900"
                >Mobile First Corp</p
              >
              <p class="jobPosition text-gray-600 text-sm md:text-base"
                >React Native Developer</p
              >
              <!-- location / type / salary -->
              <p class="jobDetails text-gray-600 text-sm md:text-base">
                Remote • Full-time • $130,000 - $175,000
              </p>
              <!-- status -->
              <p
                class="jobStatus inline-flex items-center justify-center px-4 py-1 text-xs md:text-sm font-medium text-gray-500 border border-indigo-600 rounded-full uppercase transition-all duration-300 hover:bg-indigo-600 hover:text-white cursor-pointer select-none"
              >
                Not Applied
              </p>

              <!-- notes  -->
              <p
                class="jobNotes text-gray-700 text-sm md:text-base leading-relaxed"
                >Build cross-platform mobile applications using React Native.
                Work on products used by millions of users worldwide.</p
              >

              <!-- actions buttons -->
              <div class="flex flex-wrap gap-3 pt-2">
                <button
                  class="interview-btn btn btn-success btn-outline btn-xs md:btn-sm px-4 border-green-500 text-green-500 hover:bg-green-500 hover:text-white uppercase"
                  type="button"
                  >Interview</button
                >
                <button
                  class="rejected-btn btn btn-error btn-outline btn-xs md:btn-sm px-4 border-red-500 text-red-500 hover:bg-red-500 hover:text-white uppercase"
                  type="button"
                  >Rejected</button
                >
              </div>
            </div>

            <!-- delete buttons -->
            <div class="mt-4 md:mt-0 flex items-start">
              <button
                class="delete-btn text-gray-500 hover:text-red-500 transition-colors text-lg"
                type="button"
                title="Delete"
              >
                <i class="delete-btn fa-solid fa-trash"></i>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- js link -->
    <script src="./js/script.js"></script>
  </body>
</html>
